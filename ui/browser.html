<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Séç Proxy — Built-in Browser</title>
<style>
  /* ── Reset & base ─────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0a0c0f;
    --bg2:       #111318;
    --bg3:       #1a1d24;
    --border:    #2a2d35;
    --accent:    #2563eb;
    --accent2:   #1d4ed8;
    --green:     #22c55e;
    --red:       #ef4444;
    --yellow:    #f59e0b;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --bar-h:     52px;
    --info-h:    28px;
  }

  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; }

  /* ── Top bar ──────────────────────────────────────────── */
  #topbar {
    height: var(--bar-h);
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 8px;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
  }

  #logo {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
    white-space: nowrap;
    padding-right: 4px;
    border-right: 1px solid var(--border);
    margin-right: 2px;
  }

  .nav-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 4px;
    padding: 5px 9px;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .nav-btn:hover  { background: #222530; }
  .nav-btn:active { background: var(--accent); }

  #urlbar {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    font-family: 'Courier New', monospace;
    padding: 6px 10px;
    outline: none;
    transition: border-color 0.15s;
    min-width: 0;
  }
  #urlbar:focus { border-color: var(--accent); }

  #goBtn {
    background: var(--accent);
    border: none;
    color: #fff;
    border-radius: 6px;
    padding: 6px 14px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  #goBtn:hover  { background: var(--accent2); }
  #goBtn:active { opacity: 0.8; }

  /* ── Info bar ─────────────────────────────────────────── */
  #infobar {
    height: var(--info-h);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 0 10px;
    position: fixed;
    top: var(--bar-h);
    left: 0; right: 0;
    z-index: 99;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.5px;
  }

  .info-pill {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
  }
  .dot.green  { background: var(--green); }
  .dot.red    { background: var(--red); }
  .dot.yellow { background: var(--yellow); animation: pulse 1s infinite; }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50%      { opacity: 0.3; }
  }

  #statusText { margin-left: auto; }

  /* ── Frame area ───────────────────────────────────────── */
  #frameWrap {
    position: fixed;
    top: calc(var(--bar-h) + var(--info-h));
    left: 0; right: 0; bottom: 0;
    background: var(--bg);
  }

  #pageFrame {
    width: 100%; height: 100%;
    border: none;
    background: #fff;
    display: block;
  }

  /* ── Loading overlay ──────────────────────────────────── */
  #loadOverlay {
    position: absolute;
    inset: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    font-size: 13px;
    color: var(--muted);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }
  #loadOverlay.show { opacity: 1; pointer-events: all; }

  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Empty / welcome state ────────────────────────────── */
  #welcome {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--muted);
    text-align: center;
    padding: 24px;
  }
  #welcome h2 { font-size: 18px; color: var(--text); letter-spacing: 1px; }
  #welcome p  { font-size: 12px; line-height: 1.7; max-width: 340px; }
  .quick-links { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px; }
  .ql {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 12px;
    font-size: 11px;
    color: var(--accent);
    cursor: pointer;
    transition: background 0.15s;
  }
  .ql:hover { background: #222530; }

  /* ── Error page ───────────────────────────────────────── */
  #errorPane {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: var(--muted);
    padding: 24px;
    text-align: center;
  }
  #errorPane.show { display: flex; }
  #errorPane h2 { color: var(--red); font-size: 16px; }
  #errorPane pre { font-size: 11px; background: var(--bg3); padding: 10px 16px; border-radius: 6px; max-width: 400px; word-break: break-all; white-space: pre-wrap; }
</style>
</head>
<body>

<!-- ── Top bar ─────────────────────────────────────────────── -->
<div id="topbar">
  <div id="logo">SÉÇ<br>PROXY</div>

  <button class="nav-btn" onclick="goBack()"    title="Back">◀</button>
  <button class="nav-btn" onclick="goForward()" title="Forward">▶</button>
  <button class="nav-btn" onclick="reload()"    title="Reload">↺</button>

  <input id="urlbar" type="text" placeholder="http://localhost:3000  or  https://example.com"
         onkeydown="if(event.key==='Enter') navigate()" spellcheck="false" autocomplete="off"/>

  <button id="goBtn" onclick="navigate()">Go</button>

  <button class="nav-btn" onclick="openProxyUI()" title="Open Proxy UI">⚙</button>
</div>

<!-- ── Info bar ────────────────────────────────────────────── -->
<div id="infobar">
  <div class="info-pill">
    <div class="dot green" id="proxyDot"></div>
    <span>Proxy active — no config needed</span>
  </div>
  <div class="info-pill">
    <div class="dot" id="captureDot"></div>
    <span id="captureCount">0 captured</span>
  </div>
  <span id="statusText"></span>
</div>

<!-- ── Main frame area ─────────────────────────────────────── -->
<div id="frameWrap">

  <!-- Welcome screen -->
  <div id="welcome">
    <h2>🔍 Built-in Browser</h2>
    <p>All traffic is automatically captured by Séç Proxy.<br>
       No browser proxy configuration needed.</p>
    <div class="quick-links">
      <div class="ql" onclick="loadUrl('http://localhost:8080')">localhost:8080</div>
      <div class="ql" onclick="loadUrl('http://localhost:3000')">localhost:3000</div>
      <div class="ql" onclick="loadUrl('http://localhost:5000')">localhost:5000</div>
      <div class="ql" onclick="loadUrl('http://localhost:8000')">localhost:8000</div>
      <div class="ql" onclick="loadUrl('http://localhost:4000')">localhost:4000</div>
      <div class="ql" onclick="loadUrl('http://localhost:1337')">localhost:1337</div>
    </div>
  </div>

  <!-- Loading overlay -->
  <div id="loadOverlay">
    <div class="spinner"></div>
    <span id="loadMsg">Fetching…</span>
  </div>

  <!-- Error pane -->
  <div id="errorPane">
    <h2>⚠ Connection Error</h2>
    <pre id="errorMsg"></pre>
    <button class="nav-btn" onclick="reload()" style="margin-top:8px">Try again</button>
  </div>

  <!-- The actual iframe -->
  <iframe id="pageFrame" style="display:none"
          sandbox="allow-same-origin allow-scripts allow-forms allow-popups allow-modals"
          onload="onFrameLoad()"
          onerror="onFrameError()">
  </iframe>

</div>

<script>
  // ── State ────────────────────────────────────────────────
  const frame     = document.getElementById('pageFrame');
  const urlbar    = document.getElementById('urlbar');
  const welcome   = document.getElementById('welcome');
  const loadOver  = document.getElementById('loadOverlay');
  const errorPane = document.getElementById('errorPane');
  const capCount  = document.getElementById('captureCount');
  const statusEl  = document.getElementById('statusText');
  const captureDot = document.getElementById('captureDot');

  let history    = [];
  let histIdx    = -1;
  let captured   = 0;
  let loading    = false;

  // ── Navigate to a URL ─────────────────────────────────────
  function navigate() {
    let url = urlbar.value.trim();
    if (!url) return;
    if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'http://' + url;
    loadUrl(url);
  }

  function loadUrl(url) {
    // Push to history
    if (histIdx < history.length - 1) history = history.slice(0, histIdx + 1);
    history.push(url);
    histIdx = history.length - 1;

    _load(url);
  }

  function _load(url) {
    urlbar.value = url;
    welcome.style.display   = 'none';
    errorPane.classList.remove('show');
    frame.style.display     = 'none';
    loadOver.classList.add('show');
    document.getElementById('loadMsg').textContent = 'Fetching ' + url + '…';
    statusEl.textContent = '';
    loading = true;

    const proxyUrl = '/proxy-browse?url=' + encodeURIComponent(url);
    frame.src = proxyUrl;

    // Timeout fallback (iframe load event unreliable for errors)
    setTimeout(() => {
      if (loading) {
        loading = false;
        loadOver.classList.remove('show');
        frame.style.display = 'block';
      }
    }, 12000);

    // Count as captured
    captured++;
    capCount.textContent = captured + ' captured';
    captureDot.className = 'dot yellow';
    setTimeout(() => { captureDot.className = 'dot green'; }, 800);
  }

  function onFrameLoad() {
    loading = false;
    loadOver.classList.remove('show');
    errorPane.classList.remove('show');
    frame.style.display = 'block';

    // Try to read current URL from frame (works for same-origin proxy responses)
    try {
      const loc = frame.contentWindow.location.href;
      if (loc && loc !== 'about:blank') statusEl.textContent = '';
    } catch (_) {}
  }

  function onFrameError() {
    loading = false;
    loadOver.classList.remove('show');
    frame.style.display = 'none';
    errorPane.classList.add('show');
    document.getElementById('errorMsg').textContent =
      'Could not load: ' + urlbar.value + '\n\nMake sure the target server is running.';
  }

  // ── Navigation ────────────────────────────────────────────
  function goBack() {
    if (histIdx > 0) { histIdx--; _load(history[histIdx]); }
  }

  function goForward() {
    if (histIdx < history.length - 1) { histIdx++; _load(history[histIdx]); }
  }

  function reload() {
    if (history[histIdx]) _load(history[histIdx]);
  }

  function openProxyUI() {
    window.open('/', '_blank');
  }

  // ── Poll proxy for capture count ──────────────────────────
  async function syncStats() {
    try {
      const r = await fetch('/api/stats');
      const d = await r.json();
      if (d.total !== undefined) {
        capCount.textContent = d.total + ' captured';
      }
    } catch (_) {}
  }
  setInterval(syncStats, 3000);
  syncStats();

  // ── Handle messages from iframe (link clicks rewritten) ───
  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'navigate') {
      loadUrl(e.data.url);
    }
  });
</script>

</body>
</html>
