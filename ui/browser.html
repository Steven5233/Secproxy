<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Séç Proxy — Built-in Browser</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #0a0c0f;
    --bg2:    #111318;
    --bg3:    #1a1d24;
    --border: #2a2d35;
    --accent: #2563eb;
    --accent2:#1d4ed8;
    --green:  #22c55e;
    --red:    #ef4444;
    --yellow: #f59e0b;
    --text:   #e2e8f0;
    --muted:  #64748b;
    --bar-h:  52px;
    --info-h: 28px;
  }

  html, body {
    height: 100%; overflow: hidden;
    background: var(--bg); color: var(--text);
    font-family: 'Courier New', monospace;
  }

  /* ── Top bar ── */
  #topbar {
    height: var(--bar-h);
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 6px; padding: 0 8px;
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  }
  #logo {
    font-size: 11px; font-weight: 700; color: var(--accent);
    letter-spacing: 1px; white-space: nowrap;
    padding-right: 4px; border-right: 1px solid var(--border); margin-right: 2px;
  }
  .nav-btn {
    background: var(--bg3); border: 1px solid var(--border); color: var(--text);
    border-radius: 4px; padding: 5px 9px; cursor: pointer; font-size: 14px;
    line-height: 1; transition: background 0.15s; flex-shrink: 0;
  }
  .nav-btn:active { background: var(--accent); }
  #urlbar {
    flex: 1; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 6px; color: var(--text); font-size: 13px;
    font-family: 'Courier New', monospace; padding: 6px 10px;
    outline: none; transition: border-color 0.15s; min-width: 0;
  }
  #urlbar:focus { border-color: var(--accent); }
  #goBtn {
    background: var(--accent); border: none; color: #fff;
    border-radius: 6px; padding: 6px 14px; cursor: pointer;
    font-size: 13px; font-weight: 600; white-space: nowrap; flex-shrink: 0;
  }
  #goBtn:active { opacity: 0.8; }

  /* ── Info bar ── */
  #infobar {
    height: var(--info-h); background: var(--bg); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px; padding: 0 10px;
    position: fixed; top: var(--bar-h); left: 0; right: 0; z-index: 99;
    font-size: 10px; color: var(--muted); letter-spacing: 0.5px;
  }
  .info-pill { display: flex; align-items: center; gap: 4px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); }
  .dot.green  { background: var(--green); }
  .dot.yellow { background: var(--yellow); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  #statusText { margin-left: auto; font-size: 10px; }

  /* ── Page area ── */
  #pageWrap {
    position: fixed;
    top: calc(var(--bar-h) + var(--info-h));
    left: 0; right: 0; bottom: 0;
    overflow: auto;
    background: #fff;
  }

  /* ── Welcome ── */
  #welcome {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 16px;
    color: var(--muted); text-align: center; padding: 24px;
    background: var(--bg);
  }
  #welcome h2 { font-size: 18px; color: var(--text); letter-spacing: 1px; }
  #welcome p  { font-size: 12px; line-height: 1.7; max-width: 340px; }
  .quick-links { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px; }
  .ql {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 4px;
    padding: 5px 12px; font-size: 11px; color: var(--accent); cursor: pointer;
  }

  /* ── Loading overlay ── */
  #loadOverlay {
    position: absolute; inset: 0;
    background: var(--bg);
    display: none; flex-direction: column; align-items: center;
    justify-content: center; gap: 14px; font-size: 13px; color: var(--muted);
    z-index: 10;
  }
  #loadOverlay.show { display: flex; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Error ── */
  #errorPane {
    position: absolute; inset: 0;
    background: var(--bg);
    display: none; flex-direction: column; align-items: center;
    justify-content: center; gap: 10px; color: var(--muted);
    padding: 24px; text-align: center; z-index: 10;
  }
  #errorPane.show { display: flex; }
  #errorPane h2 { color: var(--red); font-size: 16px; }
  #errorPane pre {
    font-size: 11px; background: var(--bg3); padding: 10px 16px;
    border-radius: 6px; max-width: 400px; word-break: break-all; white-space: pre-wrap;
  }

  /* ── Rendered page content ── */
  #pageContent {
    display: none;
    width: 100%; min-height: 100%;
    background: #fff;
  }
  #pageContent.show { display: block; }

  /* Reset injected content styles to look normal */
  #pageContent * { max-width: 100%; }
  #pageContent img { height: auto; }
</style>
</head>
<body>

<div id="topbar">
  <div id="logo">SÉÇ<br>PROXY</div>
  <button class="nav-btn" onclick="goBack()"    title="Back">◀</button>
  <button class="nav-btn" onclick="goForward()" title="Forward">▶</button>
  <button class="nav-btn" onclick="reload()"    title="Reload">↺</button>
  <input id="urlbar" type="text"
         placeholder="http://localhost:8080"
         onkeydown="if(event.key==='Enter') navigate()"
         spellcheck="false" autocomplete="off"/>
  <button id="goBtn" onclick="navigate()">Go</button>
  <button class="nav-btn" onclick="window.open('/','_blank')" title="Proxy UI">⚙</button>
</div>

<div id="infobar">
  <div class="info-pill">
    <div class="dot green"></div>
    <span>Proxy active — no config needed</span>
  </div>
  <div class="info-pill">
    <div class="dot" id="captureDot"></div>
    <span id="captureCount">0 captured</span>
  </div>
  <span id="statusText"></span>
</div>

<div id="pageWrap">
  <div id="welcome">
    <h2>🔍 Built-in Browser</h2>
    <p>All traffic is automatically captured by Séç Proxy.<br>No browser proxy configuration needed.</p>
    <div class="quick-links">
      <div class="ql" onclick="go('http://localhost:8080')">localhost:8080</div>
      <div class="ql" onclick="go('http://localhost:3000')">localhost:3000</div>
      <div class="ql" onclick="go('http://localhost:5000')">localhost:5000</div>
      <div class="ql" onclick="go('http://localhost:8000')">localhost:8000</div>
      <div class="ql" onclick="go('http://localhost:4000')">localhost:4000</div>
      <div class="ql" onclick="go('http://localhost:1337')">localhost:1337</div>
    </div>
  </div>

  <div id="loadOverlay">
    <div class="spinner"></div>
    <span id="loadMsg">Fetching…</span>
  </div>

  <div id="errorPane">
    <h2>⚠ Connection Error</h2>
    <pre id="errorMsg"></pre>
    <button class="nav-btn" onclick="reload()" style="margin-top:8px">Try again</button>
  </div>

  <!-- Page content rendered here — no iframe needed -->
  <div id="pageContent"></div>
</div>

<script>
'use strict';

const urlbar     = document.getElementById('urlbar');
const welcome    = document.getElementById('welcome');
const loadOver   = document.getElementById('loadOverlay');
const errorPane  = document.getElementById('errorPane');
const pageContent= document.getElementById('pageContent');
const capCount   = document.getElementById('captureCount');
const captureDot = document.getElementById('captureDot');
const statusEl   = document.getElementById('statusText');

let navHistory = [];
let histIdx    = -1;
let currentUrl = '';
let loadTimer  = null;

// ── Public shorthand used by quick-link buttons ───────────────
function go(url) { loadUrl(url); }

// ── Navigate from URL bar ─────────────────────────────────────
function navigate() {
  let url = urlbar.value.trim();
  if (!url) return;
  if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'http://' + url;
  loadUrl(url);
}

// ── Push to history and load ──────────────────────────────────
function loadUrl(url) {
  // Trim history forward stack on new navigation
  if (histIdx < navHistory.length - 1) navHistory = navHistory.slice(0, histIdx + 1);
  navHistory.push(url);
  histIdx = navHistory.length - 1;
  _fetch(url, { method: 'GET' });
}

// ── Back / Forward / Reload ───────────────────────────────────
function goBack()    { if (histIdx > 0)                      { histIdx--; _fetch(navHistory[histIdx], { method:'GET' }); } }
function goForward() { if (histIdx < navHistory.length - 1)  { histIdx++; _fetch(navHistory[histIdx], { method:'GET' }); } }
function reload()    { if (currentUrl) _fetch(currentUrl, { method:'GET' }); }

// ── Core fetch — everything goes through /proxy-browse ────────
async function _fetch(url, options) {
  currentUrl   = url;
  urlbar.value = url;

  // Show loading state
  welcome.style.display = 'none';
  pageContent.classList.remove('show');
  errorPane.classList.remove('show');
  loadOver.classList.add('show');
  document.getElementById('loadMsg').textContent = 'Fetching ' + url + '…';
  statusEl.textContent = '';
  clearTimeout(loadTimer);

  // Bump capture counter optimistically
  _bumpCapture();

  try {
    const fetchOpts = {
      method:  options.method || 'GET',
      headers: {},
    };
    if (options.body) {
      fetchOpts.body = options.body;
      fetchOpts.headers['Content-Type'] = options.contentType || 'application/x-www-form-urlencoded';
    }

    const proxyUrl = '/proxy-browse?url=' + encodeURIComponent(url);
    const resp = await fetch(proxyUrl, fetchOpts);

    // Handle redirect — follow the Location if present
    const finalUrl = resp.headers.get('x-final-url') || url;
    const ct = resp.headers.get('content-type') || '';
    statusEl.textContent = resp.status + ' ' + resp.statusText;

    if (ct.includes('text/html') || ct.includes('text/plain') || !ct) {
      const html = await resp.text();
      _renderHTML(html, url);
    } else if (ct.includes('application/json')) {
      const text = await resp.text();
      _renderJSON(text);
    } else if (ct.includes('image/')) {
      // Show image directly
      const blob = await resp.blob();
      const objUrl = URL.createObjectURL(blob);
      pageContent.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;min-height:200px;background:#111">
        <img src="${objUrl}" style="max-width:100%;height:auto;">
      </div>`;
      _showContent();
    } else {
      // Non-renderable — show info
      const size = resp.headers.get('content-length') || '?';
      pageContent.innerHTML = `<div style="padding:24px;font-family:monospace;background:#0a0c0f;color:#e2e8f0">
        <h3 style="color:#22c55e">Response received</h3>
        <p style="margin-top:8px;color:#64748b">Content-Type: ${ct}</p>
        <p style="color:#64748b">Size: ${size} bytes</p>
        <p style="margin-top:12px;color:#94a3b8">This content type cannot be rendered inline.</p>
      </div>`;
      _showContent();
    }
  } catch (e) {
    loadOver.classList.remove('show');
    errorPane.classList.add('show');
    document.getElementById('errorMsg').textContent = e.message + '\n\nMake sure the target server is running.';
  }
}

// ── Render HTML into the page content div ─────────────────────
function _renderHTML(html, baseUrl) {
  // Rewrite all links/forms to go through navigate() instead of
  // navigating the parent frame — this is what makes clicks work.
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const base = new URL(baseUrl);

  // Resolve and rewrite all <a href>
  doc.querySelectorAll('a[href]').forEach(a => {
    const href = a.getAttribute('href');
    if (!href || href.startsWith('#') || href.startsWith('javascript:') || href.startsWith('mailto:')) return;
    try {
      const abs = new URL(href, baseUrl).href;
      a.setAttribute('href', 'javascript:void(0)');
      a.setAttribute('data-proxy-href', abs);
      a.setAttribute('onclick', `window._proxyNavigate(${JSON.stringify(abs)})`);
    } catch(_) {}
  });

  // Rewrite <form action>
  doc.querySelectorAll('form').forEach(form => {
    const action = form.getAttribute('action') || baseUrl;
    try {
      const abs = new URL(action, baseUrl).href;
      form.setAttribute('data-proxy-action', abs);
      form.setAttribute('data-proxy-method', (form.method || 'GET').toUpperCase());
      form.setAttribute('action', 'javascript:void(0)');
      form.setAttribute('onsubmit', 'window._proxySubmit(this); return false;');
    } catch(_) {}
  });

  // Rewrite <img src>, <link href>, <script src> to absolute URLs
  // so assets load through the proxy-browse endpoint
  doc.querySelectorAll('img[src]').forEach(el => {
    try { el.src = '/proxy-browse?url=' + encodeURIComponent(new URL(el.getAttribute('src'), baseUrl).href); } catch(_) {}
  });
  doc.querySelectorAll('link[href]').forEach(el => {
    try { el.href = '/proxy-browse?url=' + encodeURIComponent(new URL(el.getAttribute('href'), baseUrl).href); } catch(_) {}
  });
  doc.querySelectorAll('script[src]').forEach(el => {
    // Rewrite script src so JS assets are fetched through proxy
    try { el.src = '/proxy-browse?url=' + encodeURIComponent(new URL(el.getAttribute('src'), baseUrl).href); } catch(_) {}
  });

  // Serialize back and inject
  const rewritten = doc.documentElement.outerHTML;
  pageContent.innerHTML = rewritten;
  _showContent();
}

// ── Render JSON response prettily ─────────────────────────────
function _renderJSON(text) {
  let pretty = text;
  try { pretty = JSON.stringify(JSON.parse(text), null, 2); } catch(_) {}
  pageContent.innerHTML = `<pre style="padding:16px;font-family:monospace;font-size:13px;background:#0a0c0f;color:#e2e8f0;white-space:pre-wrap;word-break:break-all;min-height:100%">${_esc(pretty)}</pre>`;
  _showContent();
}

function _showContent() {
  loadOver.classList.remove('show');
  errorPane.classList.remove('show');
  pageContent.classList.add('show');
  // Scroll to top on new page
  document.getElementById('pageWrap').scrollTop = 0;
}

function _esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Proxy navigation handlers (called from injected onclick) ──
window._proxyNavigate = function(url) {
  loadUrl(url);
};

window._proxySubmit = function(form) {
  const action  = form.getAttribute('data-proxy-action') || currentUrl;
  const method  = form.getAttribute('data-proxy-method') || 'GET';
  const data    = new URLSearchParams(new FormData(form)).toString();

  if (method === 'GET') {
    const sep = action.includes('?') ? '&' : '?';
    loadUrl(action + (data ? sep + data : ''));
  } else {
    // POST — push to history and fetch with body
    if (histIdx < navHistory.length - 1) navHistory = navHistory.slice(0, histIdx + 1);
    navHistory.push(action);
    histIdx = navHistory.length - 1;
    _fetch(action, { method: 'POST', body: data, contentType: 'application/x-www-form-urlencoded' });
  }
};

// ── Capture dot animation ─────────────────────────────────────
function _bumpCapture() {
  captureDot.className = 'dot yellow';
  setTimeout(() => { captureDot.className = 'dot green'; }, 800);
}

// ── Sync capture count from proxy stats ───────────────────────
async function syncStats() {
  try {
    const r = await fetch('/api/stats');
    const d = await r.json();
    if (d.total !== undefined) capCount.textContent = d.total + ' captured';
  } catch (_) {}
}
setInterval(syncStats, 3000);
syncStats();
</script>

</body>
</html>
